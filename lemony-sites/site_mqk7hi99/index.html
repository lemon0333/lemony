<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>밀과볕 · 동네 빵집</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --crust:#7a4a23;
    --crust-deep:#5a3416;
    --butter:#f6c453;
    --cream:#fbf3e4;
    --cream-deep:#f3e6cd;
    --dough:#fff9ef;
    --ink:#33271b;
    --ink-soft:#6b5742;
    --berry:#b8454f;
    --leaf:#7c8a4e;
    --line:#e6d6ba;
    --shadow:rgba(90,52,22,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Gowun Dodum',sans-serif;
    color:var(--ink);
    background:var(--dough);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:'Gowun Batang',serif}
  .display{font-family:'Jua',sans-serif;letter-spacing:.5px}
  a{color:inherit;text-decoration:none}
  img{max-width:100%}
  .wrap{width:min(1120px,92vw);margin:0 auto}
  button{font-family:inherit;cursor:pointer;border:none;background:none}

  /* ===== Header ===== */
  .hdr{
    position:sticky;top:0;z-index:50;
    background:rgba(251,243,228,.82);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    transition:box-shadow .3s;
  }
  .hdr.scrolled{box-shadow:0 6px 24px -16px var(--shadow)}
  .hdr-in{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{display:flex;align-items:center;gap:10px;font-size:1.45rem}
  .logo .mark{
    width:40px;height:40px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--butter),var(--crust));
    display:grid;place-items:center;font-size:1.2rem;
    box-shadow:0 4px 10px -4px var(--shadow);
    transition:transform .4s;
  }
  .logo:hover .mark{transform:rotate(-12deg) scale(1.06)}
  .nav{display:flex;gap:28px;align-items:center}
  .nav a{position:relative;color:var(--ink-soft);font-size:.98rem;transition:color .2s}
  .nav a:hover{color:var(--crust-deep)}
  .nav a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:var(--butter);transition:width .25s}
  .nav a:hover::after{width:100%}
  .cart-btn{
    position:relative;background:var(--crust);color:var(--dough);
    padding:9px 18px;border-radius:999px;font-size:.95rem;
    display:flex;align-items:center;gap:8px;transition:transform .2s,background .2s;
  }
  .cart-btn:hover{transform:translateY(-2px);background:var(--crust-deep)}
  .cart-count{
    background:var(--berry);color:#fff;border-radius:999px;
    min-width:20px;height:20px;font-size:.72rem;display:grid;place-items:center;padding:0 5px;
    font-family:'Jua',sans-serif;
  }
  .burger{display:none;font-size:1.6rem;color:var(--crust-deep)}

  /* ===== Hero ===== */
  .hero{position:relative;overflow:hidden;padding:84px 0 96px;
    background:
      radial-gradient(60% 70% at 85% 10%,rgba(246,196,83,.28),transparent 60%),
      radial-gradient(50% 60% at 5% 90%,rgba(184,69,79,.12),transparent 60%),
      var(--cream);
  }
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--dough);
    border:1px solid var(--line);padding:7px 15px;border-radius:999px;
    font-size:.85rem;color:var(--ink-soft);margin-bottom:22px}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--leaf);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .hero h1{font-size:clamp(2.4rem,5.4vw,3.7rem);line-height:1.25;margin-bottom:20px}
  .hero h1 em{font-style:normal;color:var(--crust);position:relative}
  .hero h1 em::after{content:"";position:absolute;left:-2%;bottom:6px;width:104%;height:14px;
    background:var(--butter);opacity:.5;z-index:-1;border-radius:6px}
  .hero p.lead{font-size:1.12rem;color:var(--ink-soft);max-width:46ch;margin-bottom:30px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  .btn{padding:14px 26px;border-radius:14px;font-size:1rem;transition:transform .2s,box-shadow .2s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--crust);color:var(--dough);box-shadow:0 10px 24px -12px var(--crust)}
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 16px 30px -12px var(--crust)}
  .btn-ghost{background:transparent;border:1.5px solid var(--crust);color:var(--crust-deep)}
  .btn-ghost:hover{background:var(--crust);color:var(--dough)}
  .hero-stats{display:flex;gap:30px;margin-top:38px}
  .hero-stats .num{font-family:'Jua',sans-serif;font-size:1.7rem;color:var(--crust-deep)}
  .hero-stats .lab{font-size:.85rem;color:var(--ink-soft)}
  .hero-visual{position:relative;aspect-ratio:1/1;border-radius:32px;overflow:hidden;
    box-shadow:0 30px 60px -30px var(--shadow);border:6px solid #fff;transform:rotate(2deg)}
  .hero-visual .emoji{position:absolute;inset:0;display:grid;place-items:center;font-size:13rem;
    background:radial-gradient(circle at 50% 40%,#fde9bd,#e9bf78)}
  .hero-badge{position:absolute;left:-24px;bottom:32px;background:#fff;border-radius:18px;
    padding:14px 18px;box-shadow:0 16px 30px -16px var(--shadow);transform:rotate(-4deg);font-size:.9rem}
  .hero-badge b{display:block;font-family:'Jua',sans-serif;color:var(--berry);font-size:1.1rem}

  /* ===== Section base ===== */
  section{padding:84px 0}
  .sec-head{text-align:center;max-width:60ch;margin:0 auto 50px}
  .sec-head .tag{font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:var(--butter);font-weight:700;font-family:'Jua',sans-serif}
  .sec-head h2{font-size:clamp(1.9rem,4vw,2.6rem);margin:10px 0 14px}
  .sec-head p{color:var(--ink-soft)}

  /* ===== Filter ===== */
  .filters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:42px}
  .chip{padding:9px 20px;border-radius:999px;border:1.5px solid var(--line);
    background:var(--dough);color:var(--ink-soft);font-size:.92rem;transition:all .2s}
  .chip:hover{border-color:var(--crust)}
  .chip.active{background:var(--crust);color:var(--dough);border-color:var(--crust)}

  /* ===== Menu grid ===== */
  .menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .card{background:#fff;border-radius:22px;overflow:hidden;border:1px solid var(--line);
    transition:transform .3s,box-shadow .3s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-6px);box-shadow:0 24px 40px -26px var(--shadow)}
  .card .thumb{aspect-ratio:4/3;display:grid;place-items:center;font-size:4.5rem;position:relative}
  .card .fav{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.85);display:grid;place-items:center;font-size:1.1rem;transition:transform .2s}
  .card .fav:hover{transform:scale(1.15)}
  .card .fav.on{background:var(--berry)}
  .card .body{padding:20px;display:flex;flex-direction:column;flex:1}
  .card .body h3{font-size:1.22rem;margin-bottom:6px}
  .card .desc{font-size:.9rem;color:var(--ink-soft);flex:1;margin-bottom:14px}
  .card .meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .price{font-family:'Jua',sans-serif;font-size:1.3rem;color:var(--crust-deep)}
  .add{background:var(--butter);color:var(--crust-deep);padding:9px 16px;border-radius:12px;
    font-size:.9rem;font-family:'Jua',sans-serif;transition:transform .15s,background .2s}
  .add:hover{transform:scale(1.05);background:#f3b62f}
  .soldout{filter:grayscale(.7);opacity:.7}
  .soldout .add{background:#ddd;color:#888;cursor:not-allowed}
  .badge-tag{position:absolute;top:12px;left:12px;background:var(--leaf);color:#fff;
    font-size:.72rem;padding:4px 10px;border-radius:999px;font-family:'Jua',sans-serif}

  /* ===== Story ===== */
  .story{background:var(--crust-deep);color:var(--cream)}
  .story-grid{display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:center}
  .story h2{color:#fff;font-size:clamp(1.9rem,4vw,2.6rem);margin-bottom:18px}
  .story p{color:rgba(251,243,228,.78);margin-bottom:16px}
  .story .pills{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
  .story .pill{background:rgba(255,255,255,.1);padding:9px 16px;border-radius:999px;font-size:.88rem}
  .story-visual{aspect-ratio:4/5;border-radius:28px;background:
    radial-gradient(circle at 40% 30%,#caa15f,#8a5a2c);display:grid;place-items:center;font-size:8rem;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.5)}

  /* ===== Steps ===== */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;counter-reset:s}
  .step{background:#fff;border:1px solid var(--line);border-radius:20px;padding:30px 26px;position:relative}
  .step::before{counter-increment:s;content:"0" counter(s);font-family:'Jua',sans-serif;
    font-size:2.4rem;color:var(--butter);display:block;margin-bottom:12px}
  .step h3{font-size:1.2rem;margin-bottom:8px}
  .step p{color:var(--ink-soft);font-size:.92rem}

  /* ===== Reservation form ===== */
  .reserve{background:var(--cream)}
  .form-wrap{display:grid;grid-template-columns:.9fr 1.1fr;gap:48px;align-items:start;
    background:#fff;border-radius:28px;padding:44px;border:1px solid var(--line);
    box-shadow:0 30px 60px -40px var(--shadow)}
  .form-wrap .intro h2{font-size:1.9rem;margin-bottom:14px}
  .form-wrap .intro p{color:var(--ink-soft);margin-bottom:20px}
  .info-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;font-size:.94rem}
  .info-row .ic{font-size:1.3rem}
  form .field{margin-bottom:18px}
  form label{display:block;font-size:.9rem;margin-bottom:7px;color:var(--ink-soft)}
  form input,form select,form textarea{
    width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;
    font-family:inherit;font-size:1rem;background:var(--dough);transition:border .2s,box-shadow .2s}
  form input:focus,form select:focus,form textarea:focus{
    outline:none;border-color:var(--crust);box-shadow:0 0 0 4px rgba(246,196,83,.25)}
  form .err input,form .err select{border-color:var(--berry)}
  .err-msg{color:var(--berry);font-size:.82rem;margin-top:5px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .submit{width:100%;background:var(--crust);color:var(--dough);padding:15px;border-radius:14px;
    font-size:1.05rem;font-family:'Jua',sans-serif;transition:transform .2s,background .2s;margin-top:6px}
  .submit:hover{transform:translateY(-2px);background:var(--crust-deep)}
  .ok-box{background:#eef4e3;border:1.5px solid var(--leaf);border-radius:16px;padding:26px;text-align:center}
  .ok-box .big{font-size:3rem}
  .ok-box h3{color:var(--leaf);margin:8px 0}
  .res-list{margin-top:22px}
  .res-list h4{font-size:.95rem;color:var(--ink-soft);margin-bottom:10px}
  .res-item{display:flex;justify-content:space-between;align-items:center;background:var(--dough);
    border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;font-size:.9rem}
  .res-item button{color:var(--berry);font-size:1.2rem}

  /* ===== Reviews ===== */
  .reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .review{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px}
  .review .stars{color:var(--butter);font-size:1.1rem;letter-spacing:2px;margin-bottom:12px}
  .review p{font-size:.95rem;color:var(--ink);margin-bottom:18px}
  .review .who{display:flex;align-items:center;gap:12px}
  .review .ava{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
    background:var(--cream-deep);font-size:1.1rem}
  .review .who b{font-size:.92rem}
  .review .who span{font-size:.8rem;color:var(--ink-soft)}

  /* ===== Footer ===== */
  footer{background:var(--ink);color:rgba(251,243,228,.7);padding:60px 0 30px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:36px;margin-bottom:40px}
  footer h4{color:#fff;margin-bottom:14px;font-family:'Jua',sans-serif;font-size:1rem}
  footer .logo{color:#fff;font-size:1.3rem;margin-bottom:14px}
  footer .logo .mark{width:34px;height:34px;font-size:1rem}
  footer ul{list-style:none}
  footer li{margin-bottom:9px;font-size:.9rem}
  footer a:hover{color:var(--butter)}
  .news{display:flex;gap:8px;margin-top:12px}
  .news input{flex:1;padding:11px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff}
  .news input::placeholder{color:rgba(255,255,255,.4)}
  .news button{background:var(--butter);color:var(--crust-deep);padding:0 18px;border-radius:10px;font-family:'Jua',sans-serif}
  .foot-bot{border-top:1px solid rgba(255,255,255,.12);padding-top:24px;display:flex;
    justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:.82rem}

  /* ===== Cart drawer ===== */
  .overlay{position:fixed;inset:0;background:rgba(51,39,27,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(400px,90vw);background:var(--dough);
    z-index:100;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;box-shadow:-20px 0 50px -20px rgba(0,0,0,.4)}
  .drawer.show{transform:translateX(0)}
  .drawer-head{padding:24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .drawer-head h3{font-size:1.3rem}
  .drawer-head button{font-size:1.6rem;color:var(--ink-soft)}
  .drawer-body{flex:1;overflow:auto;padding:18px 24px}
  .cart-row{display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .cart-row .ic{font-size:2rem;width:54px;height:54px;background:#fff;border-radius:14px;display:grid;place-items:center;border:1px solid var(--line)}
  .cart-row .info{flex:1}
  .cart-row .info b{font-size:.98rem}
  .cart-row .info .p{font-size:.85rem;color:var(--ink-soft)}
  .qty{display:flex;align-items:center;gap:10px;margin-top:6px}
  .qty button{width:26px;height:26px;border-radius:8px;background:#fff;border:1px solid var(--line);font-size:1rem;display:grid;place-items:center}
  .qty span{font-family:'Jua',sans-serif;min-width:18px;text-align:center}
  .cart-row .del{color:var(--berry);font-size:1.3rem;align-self:flex-start}
  .empty{text-align:center;color:var(--ink-soft);padding:50px 0}
  .empty .big{font-size:3.5rem;display:block;margin-bottom:12px}
  .drawer-foot{padding:22px 24px;border-top:1px solid var(--line);background:#fff}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .total-row b{font-family:'Jua',sans-serif;font-size:1.5rem;color:var(--crust-deep)}
  .checkout{width:100%;background:var(--crust);color:var(--dough);padding:15px;border-radius:14px;font-family:'Jua',sans-serif;font-size:1.05rem;transition:background .2s}
  .checkout:hover{background:var(--crust-deep)}

  /* ===== Toast ===== */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--crust-deep);color:var(--cream);padding:14px 26px;border-radius:999px;
    z-index:200;transition:transform .35s cubic-bezier(.2,1.4,.4,1);font-size:.95rem;
    box-shadow:0 16px 30px -14px rgba(0,0,0,.4);display:flex;gap:10px;align-items:center}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* reveal */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s}
  .reveal.in{opacity:1;transform:none}

  @media(max-width:880px){
    .hero-grid,.story-grid,.form-wrap{grid-template-columns:1fr}
    .hero-visual{transform:none;order:-1;max-width:380px;margin:0 auto}
    .menu-grid,.steps,.reviews-grid{grid-template-columns:1fr 1fr}
    .foot-grid{grid-template-columns:1fr 1fr}
    .nav{display:none}
    .burger{display:block}
    .nav.open{display:flex;position:absolute;top:72px;left:0;right:0;flex-direction:column;
      background:var(--dough);padding:20px;gap:18px;border-bottom:1px solid var(--line)}
  }
  @media(max-width:560px){
    .menu-grid,.steps,.reviews-grid,.two,.foot-grid{grid-template-columns:1fr}
    .form-wrap{padding:26px}
    .hero-stats{flex-wrap:wrap;gap:18px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const MENU = [
  { id:'p1', name:'시골 통밀 캄파뉴', cat:'bread', emoji:'🍞', price:6500, tag:'천연발효', desc:'48시간 저온 숙성 르방으로 구운 묵직한 시골빵. 겉은 바삭, 속은 촉촉.' },
  { id:'p2', name:'버터 크루아상', cat:'pastry', emoji:'🥐', price:3800, tag:'베스트', desc:'프랑스산 발효버터를 27겹 접어 구운 결결이 살아있는 크루아상.' },
  { id:'p3', name:'유기농 바게트', cat:'bread', emoji:'🥖', price:4200, desc:'재료는 밀가루·물·소금·이스트뿐. 본질에 충실한 매일의 바게트.' },
  { id:'p4', name:'소금 우유 롤', cat:'pastry', emoji:'🧈', price:3200, tag:'인기', desc:'겉은 짭조름 소금, 속은 달큰한 우유크림. 한 입의 반전.' },
  { id:'p5', name:'무화과 호두 치아바타', cat:'bread', emoji:'🫓', price:5800, desc:'반건조 무화과와 고소한 호두가 가득. 와인 안주로도 좋아요.' },
  { id:'p6', name:'딸기 생크림 케이크', cat:'cake', emoji:'🍰', price:32000, tag:'예약전용', desc:'국산 제철 딸기와 동물성 생크림. 하루 12개 한정 제작.' },
  { id:'p7', name:'다크초코 가나슈 타르트', cat:'cake', emoji:'🍫', price:6800, desc:'70% 다크 커버춰로 만든 진한 가나슈를 바삭한 타르트지에.' },
  { id:'p8', name:'얼그레이 휘낭시에', cat:'pastry', emoji:'🍪', price:2800, desc:'태운 버터 향과 얼그레이 잎의 은은함. 4구 박스도 가능.' },
  { id:'p9', name:'당근 호두 파운드', cat:'cake', emoji:'🥕', price:5200, soldout:true, desc:'시나몬과 통호두가 들어간 촉촉한 파운드. (오늘 분 완판)' },
];

const CATS = [
  { id:'all', label:'전체' },
  { id:'bread', label:'🍞 식사빵' },
  { id:'pastry', label:'🥐 페이스트리' },
  { id:'cake', label:'🍰 케이크·디저트' },
];

const won = n => n.toLocaleString('ko-KR') + '원';

function useReveal(){
  useEffect(()=>{
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    },{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  });
}

function Header({count, onCart}){
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>10);

          </button>

        </div>
      </div>
    </header>
  );
}

function Reserve({onToast}){
  const blank={name:'',phone:'',date:'',time:'11:00',item:'딸기 생크림 케이크',people:'',note:''};
  const [f,setF]=useState(blank);
  const [errs,setErrs]=useState({});
  const [done,setDone]=useState(false);
  const [list,setList]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('milbat_res')||'[]')}catch(e){return []}
  });
  useEffect(()=>{localStorage.setItem('milbat_res',JSON.stringify(list))},[list]);

  const set=(k,v)=>{ setF(p=>({...p,[k]:v})); setErrs(p=>({...p,[k]:''})); };

  const validate=()=>{
    const e={};
    if(!f.name.trim()) e.name='이름을 입력해 주세요';
    if(!/^01[0-9]-?\d{3,4}-?\d{4}$/.test(f.phone.replace(/\s/g,''))) e.phone='올바른 휴대폰 번호를 입력해 주세요';
    if(!f.date) e.date='희망 날짜를 선택해 주세요';
    else if(new Date(f.date) < new Date(new Date().toDateString())) e.date='오늘 이후 날짜만 가능해요';
    if(!f.people || +f.people<1) e.people='인원/수량을 입력해 주세요';
    setErrs(e);
    return Object.keys(e).length===0;
  };

  const submit=(ev)=>{
    ev.preventDefault();
    if(!validate()){ onToast('입력값을 다시 확인해 주세요 🙏'); return; }
    const rec={...f, id:Date.now()};
    setList(p=>[rec,...p]);
    setDone(true);
    onToast('예약이 접수됐어요! 곧 연락드릴게요 🎂');
    setF(blank);
    setTimeout(()=>setDone(false),4000);
  };

  const remove=(id)=>setList(p=>p.filter(r=>r.id!==id));

  return (
    <section className="reserve" id="reserve">
      <div className="wrap">
        <div className="form-wrap reveal">
          <div className="intro">
            <h2>케이크·대량 예약</h2>
            <p>기념일 케이크와 단체 주문은 하루 전 예약을 받습니다. 원하는 문구도 적어주세요.</p>
            <div className="info-row"><span className="ic">📍</span><div>서울 어딘가 골목길 12-3<br/>밀과볕 베이커리</div></div>
            <div className="info-row"><span className="ic">🕗</span><div>매일 08:00 – 20:00 (월요일 휴무)</div></div>
            <div className="info-row"><span className="ic">📞</span><div>02-123-4567</div></div>
            {list.length>0 && (
              <div className="res-list">
                <h4>내 예약 내역 ({list.length})</h4>
                {list.map(r=>(
                  <div className="res-item" key={r.id}>
                    <span>{r.date} · {r.time} · {r.item} ({r.people})</span>
                    <button onClick={()=>remove(r.id)} aria-label="삭제">✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {done ? (
            <div className="ok-box">
              <div className="big">🎉</div>
              <h3>예약이 접수되었습니다</h3>
              <p>담당 제빵사가 확인 후 문자로 안내드릴게요.<br/>왼쪽에서 예약 내역을 확인할 수 있어요.</p>
            </div>
          ) : (
            <form onSubmit={submit} noValidate>
              <div className="two">
                <div className={'field'+(errs.name?' err':'')}>
                  <label>이름</label>
                  <input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="홍길동"/>
                  {errs.name && <div className="err-msg">{errs.name}</div>}
                </div>
                <div className={'field'+(errs.phone?' err':'')}>
                  <label>휴대폰</label>
                  <input value={f.phone} onChange={e=>set('phone',e.target.value)} placeholder="010-1234-5678"/>
                  {errs.phone && <div className="err-msg">{errs.phone}</div>}
                </div>
              </div>
              <div className="two">
                <div className={'field'+(errs.date?' err':'')}>
                  <label>희망 날짜</label>
                  <input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/>
                  {errs.date && <div className="err-msg">{errs.date}</div>}
                </div>
                <div className="field">
                  <label>픽업 시간</label>
                  <select value={f.time} onChange={e=>set('time',e.target.value)}>
                    {['10:00','11:00','13:00','15:00','17:00','19:00'].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
              </div>
              <div className="two">
                <div className="field">
                  <label>메뉴</label>
                  <select value={f.item} onChange={e=>set('item',e.target.value)}>
                    {['딸기 생크림 케이크','다크초코 가나슈 타르트','당근 호두 파운드','크루아상 단체주문','기타(요청사항에)'].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div className={'field'+(errs.people?' err':'')}>
                  <label>수량/인원</label>
                  <input type="number" min="1" value={f.people} onChange={e=>set('people',e.target.value)} placeholder="1"/>
                  {errs.people && <div className="err-msg">{errs.people}</div>}
                </div>
              </div>
              <div className="field">
                <label>요청사항 (케이크 문구 등)</label>
                <textarea rows="3" value={f.note} onChange={e=>set('note',e.target.value)} placeholder="예) 케이크 위에 '생일 축하해 엄마' 문구 부탁드려요"></textarea>
              </div>
              <button className="submit" type="submit">예약 신청하기 🎂</button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

function Cart({open, items, onClose, setCart, onToast}){
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const chg=(id,d)=>setCart(p=>p.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const del=(id)=>setCart(p=>p.filter(i=>i.id!==id));
  const checkout=()=>{ onToast('주문이 접수됐어요! 픽업 안내를 보내드릴게요 🛍️'); setCart([]); onClose(); };
  return (
    <>
      <div className={'overlay'+(open?' show':'')} onClick={onClose}></div>
      <aside className={'drawer'+(open?' show':'')}>
        <div className="drawer-head">
          <h3 className="serif">🛒 장바구니</h3>
          <button onClick={onClose}>✕</button>
        </div>
        <div className="drawer-body">
          {items.length===0 ? (
            <div className="empty"><span className="big">🥐</span>아직 담은 빵이 없어요.<br/>진열대에서 골라보세요!</div>
          ) : items.map(it=>(
            <div className="cart-row" key={it.id}>
              <span className="ic">{it.emoji}</span>
              <div className="info">
                <b>{it.name}</b>
                <div className="p">{won(it.price)}</div>
                <div className="qty">
                  <button onClick={()=>chg(it.id,-1)}>−</button>
                  <span>{it.qty}</span>
                  <button onClick={()=>chg(it.id,1)}>+</button>
                </div>
              </div>
              <button className="del" onClick={()=>del(it.id)}>🗑</button>
            </div>
          ))}
        </div>
        {items.length>0 && (
          <div className="drawer-foot">
            <div className="total-row"><span>합계</span><b>{won(total)}</b></div>
            <button className="checkout" onClick={checkout}>주문하기</button>
          </div>
        )}
      </aside>
    </>
  );
}

function App(){
  const [cart,setCart]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('milbat_cart')||'[]')}catch(e){return []}
  });
  const [favs,setFavs]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('milbat_favs')||'[]')}catch(e){return []}
  });
  const [open,setOpen]=useState(false);
  const [toast,setToast]=useState('');
  const tRef=useRef();
  useReveal();

  useEffect(()=>{localStorage.setItem('milbat_cart',JSON.stringify(cart))},[cart]);
  useEffect(()=>{localStorage.setItem('milbat_favs',JSON.stringify(favs))},[favs]);

  const showToast=(msg)=>{
    setToast(msg);
    clearTimeout(tRef.current);
    tRef.current=setTimeout(()=>setToast(''),2600);
  };

  const add=(item)=>{
    setCart(p=>{
      const ex=p.find(i=>i.id===item.id);
      if(ex) return p.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i);
      return [...p,{...item,qty:1}];
    });
    showToast(`${item.name} 담았어요 🥖`);
  };
  const toggleFav=(id)=>setFavs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const count=cart.reduce((s,i)=>s+i.qty,0);

  return (
    <>
      <Header count={count} onCart={()=>setOpen(true)}/>
      <Hero/>
      <Menu onAdd={add} favs={favs} onFav={toggleFav}/>
      <Story/>
      <How/>
      <Reserve onToast={showToast}/>
      <Reviews/>
      <Footer onToast={showToast}/>
      <Cart open={open} items={cart} onClose={()=>setOpen(false)} setCart={setCart} onToast={showToast}/>
      <div className={'toast'+(toast?' show':'')}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
