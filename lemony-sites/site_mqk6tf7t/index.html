<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로스터리 온도 · 한 잔의 정성</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --espresso:#2b1d16;
    --bean:#4a3528;
    --crema:#c9a16b;
    --foam:#f4ece1;
    --paper:#faf6ef;
    --leaf:#5e6e52;
    --brick:#a64b2a;
    --ink:#1c130e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:'Gowun Batang',serif}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  button{font-family:inherit;cursor:pointer;border:none;background:none}

  /* Header */
  header{
    position:sticky;top:0;z-index:50;
    transition:all .35s ease;
    backdrop-filter:saturate(1.2);
  }
  header.scrolled{
    background:rgba(250,246,239,.92);
    box-shadow:0 1px 0 rgba(43,29,22,.08);
  }
  .nav{display:flex;align-items:center;justify-content:space-between;height:74px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.15rem;letter-spacing:.5px}
  .logo .mark{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--crema), var(--bean) 70%);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);
    position:relative;
  }
  .logo .mark::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:linear-gradient(transparent 48%, rgba(255,255,255,.45) 49%, transparent 51%);
  }
  .navlinks{display:flex;gap:30px;font-size:.92rem;font-weight:500}
  .navlinks a{position:relative;padding:4px 0;color:var(--bean)}
  .navlinks a::after{
    content:"";position:absolute;left:0;bottom:-2px;width:0;height:2px;
    background:var(--brick);transition:width .3s;
  }
  .navlinks a:hover::after{width:100%}
  .nav-cta{
    background:var(--espresso);color:var(--foam);
    padding:11px 22px;border-radius:30px;font-weight:700;font-size:.88rem;
    transition:transform .2s, background .2s;
  }
  .nav-cta:hover{transform:translateY(-2px);background:var(--brick)}
  .burger{display:none;font-size:1.6rem;color:var(--espresso)}

  /* Hero */
  .hero{
    position:relative;overflow:hidden;
    background:linear-gradient(160deg,#2b1d16 0%, #3c2a1f 55%, #4a3528 100%);
    color:var(--foam);
    padding:96px 0 120px;
  }
  .hero::before{
    content:"";position:absolute;right:-140px;top:-120px;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle, rgba(201,161,107,.35), transparent 65%);
  }
  .hero::after{
    content:"";position:absolute;left:-90px;bottom:-150px;width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle, rgba(166,75,42,.28), transparent 70%);
  }
  .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center;position:relative;z-index:2}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.8rem;letter-spacing:3px;text-transform:uppercase;
    color:var(--crema);font-weight:700;margin-bottom:22px;
  }
  .eyebrow::before{content:"";width:30px;height:1px;background:var(--crema)}
  .hero h1{font-size:clamp(2.4rem,5vw,3.8rem);line-height:1.2;font-weight:900;margin-bottom:22px}
  .hero h1 em{color:var(--crema);font-style:normal}
  .hero p.lead{font-size:1.08rem;color:rgba(244,236,225,.82);max-width:480px;font-weight:300;margin-bottom:34px}
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap}
  .btn-primary{
    background:var(--crema);color:var(--espresso);padding:14px 30px;border-radius:30px;
    font-weight:700;transition:transform .2s, box-shadow .2s;box-shadow:0 8px 24px rgba(201,161,107,.3);
  }
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(201,161,107,.45)}
  .btn-ghost{
    border:1.5px solid rgba(244,236,225,.4);color:var(--foam);padding:14px 28px;border-radius:30px;font-weight:600;transition:.2s;
  }
  .btn-ghost:hover{background:rgba(244,236,225,.1);border-color:var(--foam)}
  .hero-stats{display:flex;gap:34px;margin-top:46px}
  .hero-stats .num{font-size:1.9rem;font-weight:900;color:var(--crema)}
  .hero-stats .lab{font-size:.82rem;color:rgba(244,236,225,.7)}

  .cup{
    position:relative;aspect-ratio:1/1;border-radius:24px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.45);
    background:linear-gradient(135deg,#6b4a35,#3c2a1f);
  }
  .cup-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .saucer{
    width:62%;aspect-ratio:1/1;border-radius:50%;
    background:radial-gradient(circle at 50% 38%, #1c130e 0 30%, #2b1d16 32% 46%, #6b4a35 47% 100%);
    box-shadow:0 16px 40px rgba(0,0,0,.5), inset 0 -10px 30px rgba(0,0,0,.4);
    position:relative;animation:float 6s ease-in-out infinite;
  }
  .steam{position:absolute;top:-46px;left:50%;width:8px;height:54px;border-radius:8px;
    background:linear-gradient(to top, rgba(255,255,255,.55), transparent);
    filter:blur(2px);animation:steam 3.5s ease-in-out infinite;}
  .steam:nth-child(2){transform:translateX(-16px);animation-delay:.6s;height:42px}
  .steam:nth-child(3){transform:translateX(14px);animation-delay:1.1s;height:48px}
  @keyframes steam{0%{opacity:0;transform:translateY(8px) scaleY(.8)}40%{opacity:.7}100%{opacity:0;transform:translateY(-22px) scaleY(1.2)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .badge-float{
    position:absolute;background:var(--paper);color:var(--espresso);
    border-radius:16px;padding:12px 16px;box-shadow:0 12px 30px rgba(0,0,0,.25);
    font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:8px;
  }
  .badge-float .dot{width:9px;height:9px;border-radius:50%;background:var(--leaf)}
  .bf1{bottom:24px;left:-14px}
  .bf2{top:30px;right:-10px}

  /* Section base */
  section{padding:96px 0}
  .sec-head{text-align:center;max-width:620px;margin:0 auto 56px}
  .sec-tag{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--brick);font-weight:700}
  .sec-head h2{font-size:clamp(1.9rem,3.6vw,2.7rem);font-weight:900;margin:14px 0 16px;line-height:1.25}
  .sec-head p{color:#6b5a4d;font-weight:300}

  /* About */
  .about{background:var(--foam)}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
  .about .frame{
    aspect-ratio:4/5;border-radius:24px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#c9a16b,#8a6a47);
    box-shadow:0 24px 60px rgba(74,53,40,.25);
  }
  .about .frame .grain{position:absolute;inset:0;opacity:.35;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.4) 0 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,.18) 0 3px, transparent 4px),
      radial-gradient(circle at 45% 80%, rgba(0,0,0,.14) 0 2px, transparent 3px);
    background-size:80px 80px,120px 120px,90px 90px;}
  .about .frame .quote{
    position:absolute;left:24px;right:24px;bottom:24px;color:#fff;
    font-family:'Gowun Batang',serif;font-size:1.3rem;line-height:1.6;text-shadow:0 2px 12px rgba(0,0,0,.4);
  }
  .about-text h2{font-size:2.2rem;font-weight:900;line-height:1.3;margin:12px 0 20px}
  .about-text p{color:#5b4a3d;margin-bottom:18px}
  .features{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:28px}
  .feat{background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(74,53,40,.07);border:1px solid rgba(201,161,107,.18)}
  .feat .ic{font-size:1.6rem;margin-bottom:8px}
  .feat h4{font-size:.98rem;font-weight:700;margin-bottom:4px}
  .feat p{font-size:.84rem;color:#7a6a5c;margin:0}

  /* Menu */
  .menu-tabs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:42px}
  .menu-tabs button{
    padding:10px 24px;border-radius:30px;font-weight:600;font-size:.92rem;
    background:#fff;color:var(--bean);border:1.5px solid rgba(74,53,40,.14);transition:.22s;
  }
  .menu-tabs button.active{background:var(--espresso);color:var(--foam);border-color:var(--espresso);transform:translateY(-2px)}
  .menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
  .mcard{
    background:#fff;border-radius:18px;padding:24px;display:flex;gap:18px;align-items:flex-start;
    border:1px solid rgba(201,161,107,.2);transition:transform .25s, box-shadow .25s;cursor:default;
  }
  .mcard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(74,53,40,.12)}
  .mcard .thumb{
    width:64px;height:64px;border-radius:14px;flex:none;font-size:1.8rem;
    display:flex;align-items:center;justify-content:center;background:var(--foam);
  }
  .mcard .info{flex:1}
  .mcard .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .mcard h4{font-size:1.05rem;font-weight:700}
  .mcard .price{font-weight:900;color:var(--brick);white-space:nowrap}
  .mcard .desc{font-size:.86rem;color:#7a6a5c;margin-top:6px}
  .mcard .tag{display:inline-block;margin-top:10px;font-size:.72rem;font-weight:700;color:var(--leaf);background:rgba(94,110,82,.12);padding:3px 10px;border-radius:20px}

  /* Gallery / vibe */
  .vibe{background:var(--espresso);color:var(--foam)}
  .vibe .sec-head h2{color:var(--foam)}
  .vibe .sec-head p{color:rgba(244,236,225,.7)}
  .gal{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:160px;gap:14px}
  .gal div{border-radius:16px;overflow:hidden;position:relative;transition:transform .3s}
  .gal div:hover{transform:scale(1.03)}
  .gal div span{position:absolute;left:14px;bottom:12px;font-size:.82rem;font-weight:700;z-index:2;text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .gal div::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.4))}
  .g1{grid-row:span 2;background:linear-gradient(135deg,#6b4a35,#2b1d16)}
  .g2{background:linear-gradient(135deg,#a64b2a,#6b2f1a)}
  .g3{background:linear-gradient(135deg,#5e6e52,#36402f)}
  .g4{grid-column:span 2;background:linear-gradient(135deg,#c9a16b,#8a6a47)}
  .g5{background:linear-gradient(135deg,#3c2a1f,#1c130e)}

  /* Reservation */
  .reserve{background:var(--foam)}
  .res-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:start}
  .res-info h2{font-size:2rem;font-weight:900;margin-bottom:16px;line-height:1.3}
  .res-info p{color:#5b4a3d;margin-bottom:28px}
  .infoline{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
  .infoline .ic{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex:none;box-shadow:0 6px 18px rgba(74,53,40,.08)}
  .infoline h5{font-size:.95rem;font-weight:700}
  .infoline p{font-size:.86rem;color:#7a6a5c;margin:0}
  form{background:#fff;border-radius:22px;padding:34px;box-shadow:0 20px 50px rgba(74,53,40,.12)}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:7px;color:var(--bean)}
  .field input,.field select,.field textarea{
    width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid rgba(74,53,40,.16);
    font-family:inherit;font-size:.92rem;background:var(--paper);transition:.2s;color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--crema);box-shadow:0 0 0 4px rgba(201,161,107,.18);background:#fff}
  .field.err input,.field.err select{border-color:var(--brick);background:#fdf1ed}
  .field .msg{font-size:.76rem;color:var(--brick);margin-top:5px;font-weight:600}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .submit{
    width:100%;background:var(--espresso);color:var(--foam);padding:15px;border-radius:14px;
    font-weight:700;font-size:1rem;transition:.22s;margin-top:6px;
  }
  .submit:hover{background:var(--brick);transform:translateY(-2px)}
  .toast{background:rgba(94,110,82,.14);border:1px solid var(--leaf);color:#3f4d35;border-radius:12px;padding:14px 16px;font-size:.88rem;font-weight:600;margin-bottom:18px;display:flex;gap:10px;align-items:center}
  .bookings{margin-top:24px}
  .bookings h5{font-size:.82rem;letter-spacing:1px;text-transform:uppercase;color:#9a8a7c;margin-bottom:12px;font-weight:700}
  .bk{display:flex;justify-content:space-between;align-items:center;background:var(--paper);border-radius:12px;padding:12px 14px;margin-bottom:9px;font-size:.86rem;border:1px solid rgba(74,53,40,.1)}
  .bk .who{font-weight:700}
  .bk .meta{color:#8a7a6c;font-size:.8rem}
  .bk button{color:var(--brick);font-size:1.1rem;font-weight:700;padding:4px 8px;border-radius:8px;transition:.15s}
  .bk button:hover{background:rgba(166,75,42,.1)}
  .empty{font-size:.84rem;color:#a89888;text-align:center;padding:14px}

  /* Footer */
  footer{background:var(--ink);color:rgba(244,236,225,.72);padding:60px 0 30px}
  .foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:40px;margin-bottom:40px}
  footer .logo{color:var(--foam);margin-bottom:14px}
  footer p{font-size:.88rem;max-width:300px;font-weight:300}
  footer h6{color:var(--crema);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;font-weight:700}
  footer ul{list-style:none}
  footer ul li{margin-bottom:9px;font-size:.88rem}
  footer ul li a:hover{color:var(--foam)}
  .foot-bot{border-top:1px solid rgba(244,236,225,.12);padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:.8rem;color:rgba(244,236,225,.5)}
  .socials{display:flex;gap:12px}
  .socials a{width:36px;height:36px;border-radius:50%;border:1px solid rgba(244,236,225,.25);display:flex;align-items:center;justify-content:center;transition:.2s}
  .socials a:hover{background:var(--crema);color:var(--ink);border-color:var(--crema)}

  @media(max-width:880px){
    .hero-grid,.about-grid,.res-grid{grid-template-columns:1fr;gap:40px}
    .menu-grid{grid-template-columns:1fr}
    .gal{grid-template-columns:repeat(2,1fr)}
    .g4{grid-column:span 2}
    .navlinks{display:none}
    .burger{display:block}
    .foot-grid{grid-template-columns:1fr;gap:28px}
    .cup{max-width:380px;margin:0 auto}
  }
  @media(max-width:520px){
    .row2{grid-template-columns:1fr}
    .features{grid-template-columns:1fr}
    .hero-stats{gap:22px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const MENU = {
  signature: [
    { ic:"☕", name:"온도 블렌드", price:"5,500", desc:"고소한 견과와 다크초콜릿의 균형. 우리 매장의 시그니처 라떼.", tag:"BEST" },
    { ic:"🌰", name:"흑임자 라떼", price:"6,000", desc:"국산 흑임자를 직접 갈아 고소함을 끌어올린 한 잔.", tag:"시즌" },
    { ic:"🍯", name:"꿀생강 카푸치노", price:"6,200", desc:"생강청과 벨벳 폼이 어우러진 겨울 한정 메뉴.", tag:"한정" },
    { ic:"🥛", name:"피스타치오 크림라떼", price:"6,500", desc:"고소한 피스타치오 크림을 듬뿍 올린 디저트 같은 음료.", tag:"인기" },
  ],
  coffee: [
    { ic:"☕", name:"에스프레소", price:"4,000", desc:"싱글 오리진 원두로 내린 진한 한 모금." },
    { ic:"☕", name:"아메리카노", price:"4,500", desc:"산미와 바디가 살아있는 데일리 커피." },
    { ic:"🥛", name:"카페라떼", price:"5,000", desc:"부드러운 스팀 우유와 풍미의 조화." },
    { ic:"🧊", name:"콜드브루", price:"5,500", desc:"18시간 저온 추출, 깔끔한 단맛." },
  ],
  dessert: [
    { ic:"🍰", name:"바스크 치즈케이크", price:"6,800", desc:"겉은 진하게, 속은 촉촉하게 구운 시그니처 디저트." },
    { ic:"🥐", name:"버터 크루아상", price:"4,500", desc:"매일 아침 직접 굽는 결이 살아있는 페이스트리." },
    { ic:"🍪", name:"수제 르뱅쿠키", price:"3,800", desc:"겉바속촉, 다크초콜릿 듬뿍." },
    { ic:"🧁", name:"얼그레이 까눌레", price:"4,200", desc:"향긋한 얼그레이를 머금은 쫀득한 까눌레." },
  ],
};
const TAB_LABEL = { signature:"시그니처", coffee:"커피", dessert:"디저트" };
const STORAGE = "ondo_cafe_bookings";

function Header(){
  const [scrolled,setScrolled] = useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>20);
    window.addEventListener("scroll",h); return ()=>window.removeEventListener("scroll",h);
  },[]);
  return (
    <header className={scrolled?"scrolled":""}>
      <div className="wrap nav">
        <a href="#top" className="logo"><span className="mark"></span>로스터리 온도</a>
        <nav className="navlinks">
          <a href="#about">소개</a>
          <a href="#menu">메뉴</a>
          <a href="#vibe">공간</a>
          <a href="#reserve">예약</a>
        </nav>
        <a href="#reserve" className="nav-cta">자리 예약하기</a>
        <button className="burger" onClick={()=>{document.querySelector('#reserve').scrollIntoView()}}>≡</button>
      </div>
    </header>
  );
}

function Hero(){
  return (
    <section className="hero" id="top" style={{padding:0}}>
      <div className="wrap" style={{padding:"96px 24px 120px"}}>
        <div className="hero-grid">
          <div>
            <span className="eyebrow">SINCE 2017 · 성수동 골목</span>
            <h1>매일의 온도를<br/><em>한 잔에 담다</em></h1>
            <p className="lead">직접 로스팅한 스페셜티 원두와 계절을 담은 디저트.
              조용한 골목 끝, 천천히 흐르는 시간 속에서 오롯이 나를 위한 휴식을 건넵니다.</p>
            <div className="hero-actions">
              <a href="#menu" className="btn-primary">메뉴 둘러보기</a>
              <a href="#reserve" className="btn-ghost">방문 예약 →</a>
            </div>
            <div className="hero-stats">
              <div><div className="num">7년</div><div className="lab">한자리에서</div></div>
              <div><div className="num">12종</div><div className="lab">싱글 오리진</div></div>
              <div><div className="num">4.9</div><div className="lab">방문자 평점</div></div>
            </div>
          </div>
          <div className="cup">
            <div className="cup-art">
              <div className="saucer">

function Reserve(){
  const [form,setForm]=useState({name:"",phone:"",date:"",time:"14:00",guests:"2",note:""});
  const [errors,setErrors]=useState({});
  const [done,setDone]=useState(false);
  const [bookings,setBookings]=useState([]);

  useEffect(()=>{
    try{ const s=localStorage.getItem(STORAGE); if(s) setBookings(JSON.parse(s)); }catch(e){}
  },[]);
  useEffect(()=>{
    try{ localStorage.setItem(STORAGE,JSON.stringify(bookings)); }catch(e){}
  },[bookings]);

  const set=(k)=>(e)=>{ setForm({...form,[k]:e.target.value}); setErrors({...errors,[k]:null}); setDone(false); };

  const validate=()=>{
    const er={};
    if(!form.name.trim()) er.name="이름을 입력해 주세요.";
    if(!/^0\d{1,2}-?\d{3,4}-?\d{4}$/.test(form.phone.replace(/\s/g,""))) er.phone="올바른 연락처를 입력해 주세요.";
    if(!form.date) er.date="방문 날짜를 선택해 주세요.";
    return er;
  };

  const submit=(e)=>{
    e.preventDefault();
    const er=validate();
    if(Object.keys(er).length){ setErrors(er); return; }
    const bk={ id:Date.now()+"-"+form.name, ...form };
    setBookings([bk,...bookings]);
    setDone(true);
    setForm({name:"",phone:"",date:"",time:"14:00",guests:"2",note:""});
  };

  const remove=(id)=>setBookings(bookings.filter(b=>b.id!==id));

  return (
    <section className="reserve" id="reserve">
      <div className="wrap res-grid">
        <div className="res-info">
          <span className="sec-tag">VISIT US</span>
          <h2>자리를 미리<br/>예약해 두세요</h2>
          <p>주말은 금세 만석이 됩니다. 원하는 시간에 편안하게 즐기실 수 있도록 미리 예약해 주세요.</p>
          <div className="infoline"><div className="ic">📍</div><div><h5>위치</h5><p>서울 성동구 성수이로 14길 23, 1층</p></div></div>
          <div className="infoline"><div className="ic">🕘</div><div><h5>영업시간</h5><p>매일 09:00 – 22:00 (라스트오더 21:30)</p></div></div>
          <div className="infoline"><div className="ic">📞</div><div><h5>전화</h5><p>02-1234-5678</p></div></div>
        </div>
        <form onSubmit={submit} noValidate>
          {done && <div className="toast">✅ 예약이 접수되었습니다! 곧 확인 문자를 보내드릴게요.</div>}
          <div className={"field"+(errors.name?" err":"")}>
            <label>이름</label>
            <input value={form.name} onChange={set("name")} placeholder="홍길동" />
            {errors.name && <div className="msg">{errors.name}</div>}
          </div>
          <div className={"field"+(errors.phone?" err":"")}>
            <label>연락처</label>
            <input value={form.phone} onChange={set("phone")} placeholder="010-1234-5678" />
            {errors.phone && <div className="msg">{errors.phone}</div>}
          </div>
          <div className="row2">
            <div className={"field"+(errors.date?" err":"")}>
              <label>방문 날짜</label>
              <input type="date" value={form.date} onChange={set("date")} />
              {errors.date && <div className="msg">{errors.date}</div>}
            </div>
            <div className="field">
              <label>시간</label>
              <select value={form.time} onChange={set("time")}>
                {["10:00","12:00","14:00","16:00","18:00","20:00"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="row2">
            <div className="field">
              <label>인원</label>
              <select value={form.guests} onChange={set("guests")}>
                {["1","2","3","4","5","6명 이상"].map(g=><option key={g} value={g}>{g}{g.includes("명")?"":"명"}</option>)}
              </select>
            </div>
            <div className="field">
              <label>요청사항</label>
              <input value={form.note} onChange={set("note")} placeholder="창가 자리 희망 등" />
            </div>
          </div>
          <button type="submit" className="submit">예약 신청하기</button>

          <div className="bookings">
            <h5>내 예약 내역 ({bookings.length})</h5>
            {bookings.length===0 && <div className="empty">아직 예약 내역이 없어요.</div>}
            {bookings.map(b=>(
              <div className="bk" key={b.id}>
                <div>
                  <div className="who">{b.name} · {b.guests}{b.guests.includes("명")?"":"명"}</div>
                  <div className="meta">{b.date} {b.time}{b.note?" · "+b.note:""}</div>
                </div>
                <button onClick={()=>remove(b.id)} aria-label="삭제">×</button>
              </div>
            ))}
          </div>
        </form>
      </div>
    </section>
  );
}

  );
}
