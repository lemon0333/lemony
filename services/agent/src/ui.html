<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>lemony 🍋</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0b0b0d; --panel:#161618; --line:#262629; --muted:#8a8a90; --accent:#6d5efc; }
  html,body { height:100%; }
  body { background:var(--bg); color:#f2f2f4; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif; overflow:hidden; }
  .app { display:flex; height:100vh; }

  /* 사이드바 */
  .side { width:72px; background:#0e0e10; border-right:1px solid var(--line); display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:18px; flex-shrink:0; }
  .logo { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,#ff8a3d,#ff5db1); }
  .avatar { width:34px; height:34px; border-radius:9px; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:14px; }
  .side .ic { width:22px; height:22px; color:#6b6b72; cursor:pointer; }
  .side .ic:hover { color:#ddd; }
  .side .spacer { flex:1; }

  /* 메인 */
  .main { flex:1; position:relative; display:flex; flex-direction:column; }

  /* 랜딩(히어로) */
  #landing { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:24px; }
  #landing .glow { position:absolute; inset:0; background:
      radial-gradient(60% 50% at 50% 115%, #ff3d8b 0%, transparent 60%),
      radial-gradient(55% 45% at 50% 100%, #8a5bff 0%, transparent 55%),
      radial-gradient(60% 50% at 50% 130%, #ff7a3d 0%, transparent 55%);
    filter:saturate(1.1); z-index:0; }
  #landing > * { position:relative; z-index:1; }
  .promo { display:inline-flex; align-items:center; gap:10px; background:rgba(20,20,24,.6); border:1px solid var(--line); padding:8px 14px; border-radius:999px; font-size:14px; backdrop-filter:blur(6px); }
  .promo b { background:var(--accent); color:#fff; padding:2px 9px; border-radius:999px; font-size:12px; }
  .head { font-size:44px; font-weight:700; letter-spacing:-.02em; text-align:center; }

  /* 채팅 입력박스 */
  .box { width:min(760px,92vw); background:#1b1b1e; border:1px solid #2c2c30; border-radius:22px; padding:16px 16px 12px; box-shadow:0 20px 60px rgba(0,0,0,.45); }
  .box textarea { width:100%; background:transparent; border:0; color:#f2f2f4; font-size:16px; resize:none; outline:none; min-height:26px; max-height:160px; font-family:inherit; }
  .box textarea::placeholder { color:#7a7a80; }
  .box .row { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
  .box .left, .box .right { display:flex; align-items:center; gap:10px; }
  .chip { color:#cfcfd4; font-size:14px; display:flex; align-items:center; gap:4px; }
  .iconbtn { width:34px; height:34px; border-radius:50%; border:0; background:#2a2a2e; color:#cfcfd4; cursor:pointer; display:grid; place-items:center; }
  .send { background:#3a3a40; }
  .send:enabled { background:#f2f2f4; color:#111; }
  .plus { width:34px; height:34px; border-radius:8px; background:transparent; border:0; color:#9a9aa0; font-size:22px; cursor:pointer; }

  /* 워크스페이스(생성 후) */
  #workspace { display:none; flex:1; }
  #workspace.on { display:flex; }
  .chat { width:400px; border-right:1px solid var(--line); display:flex; flex-direction:column; background:linear-gradient(180deg,#101013,#0c0c0e); }
  .chat .chead { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:9px; font-weight:700; }
  .chat .chead .dotlogo { width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,#ff8a3d,#ff5db1); }
  .chat .log { flex:1; overflow:auto; padding:18px; display:flex; flex-direction:column; gap:14px; }
  .msg { padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.55; max-width:88%; word-break:break-word; box-shadow:0 2px 8px rgba(0,0,0,.25); }
  .msg.me { align-self:flex-end; background:linear-gradient(135deg,#6d5efc,#8a5bff); color:#fff; border-bottom-right-radius:5px; }
  .msg.ai { align-self:flex-start; background:#1b1b1f; border:1px solid #2a2a30; color:#e9e9ec; border-bottom-left-radius:5px; }
  .msg.ai.work { color:#bdf24a; border-color:#39431f; }
  .chat .compose { border-top:1px solid var(--line); padding:14px; display:flex; gap:8px; }
  .chat .compose input { flex:1; background:#1b1b1e; border:1px solid #2c2c30; color:#f2f2f4; border-radius:13px; padding:12px 14px; outline:none; font-size:14px; }
  .chat .compose input:focus { border-color:var(--accent); }
  .preview { flex:1; background:#fff; position:relative; }
  .preview iframe { width:100%; height:100%; border:0; }
  .bar { height:42px; background:#0e0e10; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; padding:0 16px; color:var(--muted); font-size:12px; }
  .dot { width:11px; height:11px; border-radius:50%; }
  .spin { width:16px; height:16px; border:2px solid #444; border-top-color:#bdf24a; border-radius:50%; animation:s .8s linear infinite; display:inline-block; vertical-align:-3px; }
  @keyframes s { to { transform:rotate(360deg); } }

  /* 로그인 오버레이 */
  #login { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(70% 60% at 50% 120%, #ff3d8b 0%, transparent 55%), radial-gradient(60% 50% at 50% 110%, #8a5bff 0%, transparent 50%), #0b0b0d; }
  #login .card { width:340px; background:rgba(20,20,24,.82); border:1px solid var(--line); border-radius:20px; padding:30px 26px; text-align:center; backdrop-filter:blur(10px); box-shadow:0 30px 80px rgba(0,0,0,.5); }
  #login h2 { font-size:22px; margin-bottom:6px; }
  #login p { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .lbtn { width:100%; padding:12px; border-radius:11px; border:1px solid #303035; background:#1d1d20; color:#f2f2f4; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .lbtn:hover { border-color:#4a4a52; }
  .lbtn.gh { background:#1f2328; }
  .lbtn.gg { background:#fff; color:#1a1a1a; border-color:#fff; }
  .lbtn.demo { background:transparent; color:#bdf24a; border-color:#3a4a22; }
  .lbtn:disabled { opacity:.45; cursor:not-allowed; }
  #login .or { color:#55555c; font-size:12px; margin:6px 0 12px; }
  #login .note { color:#7a7a80; font-size:11px; margin-top:8px; min-height:14px; }
  #projects { width:min(760px,92vw); margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
  #projects .label { width:100%; color:#6b6b72; font-size:12px; }
  #projects .pill { background:rgba(20,20,24,.6); border:1px solid var(--line); color:#cfcfd4; padding:7px 12px; border-radius:999px; font-size:13px; cursor:pointer; }
  #projects .pill:hover { border-color:#4a4a52; color:#fff; }
</style>
</head>
<body>
<div id="login">
  <div class="card">
    <div class="logo" style="width:40px;height:40px;border-radius:11px;margin:0 auto 14px"></div>
    <h2>lemony 시작하기 🍋</h2>
    <p>로그인하고 한 줄로 웹사이트를 만들어보세요.</p>
    <button class="lbtn gh" id="loginGithub">GitHub로 계속하기</button>
    <button class="lbtn gg" id="loginGoogle">Google로 계속하기</button>
    <div class="or">또는</div>
    <button class="lbtn demo" id="loginDemo">데모로 둘러보기</button>
    <p class="note" id="loginNote"></p>
  </div>
</div>
<div class="app">
  <nav class="side">
    <div class="logo"></div>
    <div class="avatar">S</div>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 16l3-5 5-3-3 5z"/></svg>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M8 6h6a4 4 0 014 4v6"/></svg>
    <div class="spacer"></div>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.3 5.9.9-4.3 4.2 1 5.9L12 16.9 6.8 19.3l1-5.9L3.5 9.2l5.9-.9z"/></svg>
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>
  </nav>

  <main class="main">
    <!-- 랜딩 -->
    <section id="landing">
      <div class="glow"></div>
      <div class="promo"><b>Promo</b> 한국어 한 줄이면 웹사이트가 됩니다 →</div>
      <h1 class="head" id="headline">무엇을 만들까요, 손현빈?</h1>
      <div class="box">
        <textarea id="prompt" rows="1" placeholder="lemony에게 웹사이트를 만들어달라고 해보세요…  예: 동네 빵집 소개 페이지"></textarea>
        <div class="row">
          <div class="left"><button class="plus" title="첨부">+</button></div>
          <div class="right">
            <span class="chip">Build ▾</span>
            <button class="iconbtn" title="음성">🎤</button>
            <button class="iconbtn send" id="go" title="만들기" disabled>↑</button>
          </div>
        </div>
      </div>
      <div id="projects"></div>
    </section>

    <!-- 워크스페이스 -->
    <section id="workspace">
      <div class="chat">
        <div class="chead"><span class="dotlogo"></span> lemony</div>
        <div class="log" id="log"></div>
        <div class="compose">
          <input id="editInput" placeholder="바꾸고 싶은 걸 말해보세요… 예: 다크모드로" />
          <button class="iconbtn send" id="editGo" title="수정">↑</button>
        </div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column;">
        <div class="bar"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span><span id="status" style="margin-left:8px;">미리보기</span></div>
        <div class="preview"><iframe id="frame" title="preview"></iframe></div>
      </div>
    </section>
  </main>
</div>

<script>
const API = location.origin; // 같은 서버가 UI와 API를 함께 서빙
let siteId = null;
const $ = (s) => document.querySelector(s);
const promptEl = $('#prompt'), go = $('#go'), log = $('#log'), frame = $('#frame'), statusEl = $('#status');

promptEl.addEventListener('input', () => { go.disabled = !promptEl.value.trim(); autoGrow(promptEl); });
promptEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) create(); });
go.addEventListener('click', create);
$('#editGo').addEventListener('click', edit);
$('#editInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') edit(); });

function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(160,t.scrollHeight)+'px'; }
function addMsg(text, who){ const d=document.createElement('div'); d.className='msg '+who; d.innerHTML=text; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
function showWorkspace(){ $('#landing').style.display='none'; $('#workspace').classList.add('on'); }
function refresh(url){ frame.src = API + url + '?t=' + Date.now(); }

async function create(){
  const prompt = promptEl.value.trim(); if(!prompt) return;
  showWorkspace();
  addMsg(prompt, 'me');
  const working = addMsg('<span class="spin"></span> 사이트를 만들고 있어요…', 'ai work');
  statusEl.textContent = '생성 중…';
  try {
    const r = await fetch(API+'/create', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({prompt})});
    const d = await r.json();
    if(d.error){ working.className='msg ai'; working.textContent='에러: '+d.error; return; }
    siteId = d.id;
    working.className='msg ai'; working.textContent='✅ 사이트를 만들었어요. 오른쪽에서 확인하고, 바꾸고 싶은 걸 말해보세요.';
    statusEl.textContent = '미리보기 · ' + siteId;
    refresh(d.previewUrl);
  } catch(e){ working.className='msg ai'; working.textContent='연결 실패: 에이전트 서버(/serve)가 켜져 있나요? '+e; }
}

async function edit(){
  const inp = $('#editInput'); const prompt = inp.value.trim(); if(!prompt || !siteId) return;
  inp.value='';
  addMsg(prompt, 'me');
  const working = addMsg('<span class="spin"></span> 바꾸는 중…', 'ai work');
  statusEl.textContent = '수정 중…';
  try {
    const r = await fetch(API+'/edit-site', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({id:siteId, prompt})});
    const d = await r.json();
    if(d.error){ working.className='msg ai'; working.textContent='에러: '+d.error; return; }
    working.className='msg ai'; working.textContent='✅ 이렇게 바꿨어요.';
    statusEl.textContent = '미리보기 · ' + siteId;
    refresh(d.previewUrl);
  } catch(e){ working.className='msg ai'; working.textContent='실패: '+e; }
}

// ── 인증(소셜 로그인) ──
const loginEl = $('#login');
function onLoggedIn(user){
  loginEl.style.display='none';
  const first = (user.name||'').trim().split(' ')[0] || user.name || '';
  $('#headline').textContent = `무엇을 만들까요, ${first}?`;
  const av = document.querySelector('.avatar');
  av.textContent = (user.name||'?').slice(0,1).toUpperCase();
  av.title = `${user.name} (${user.provider}) · 클릭하면 로그아웃`;
  av.style.cursor = 'pointer';
  av.onclick = async () => { if(confirm('로그아웃할까요?')){ await fetch(API+'/auth/logout',{method:'POST'}); location.href='/'; } };
}
async function loadSites(){
  try {
    const d = await (await fetch(API+'/sites')).json();
    const box = $('#projects');
    if(!d.sites || !d.sites.length){ box.innerHTML=''; return; }
    box.innerHTML = '<div class="label">내 프로젝트</div>' +
      d.sites.map(s => `<span class="pill" data-id="${s.id}" data-url="${s.previewUrl}">${(s.name||s.id)}</span>`).join('');
    box.querySelectorAll('.pill').forEach(p => p.onclick = () => openSite(p.dataset.id, p.dataset.url));
  } catch(e){}
}
function openSite(id, url){
  siteId = id; showWorkspace(); log.innerHTML='';
  addMsg('기존 프로젝트를 불러왔어요. 바꾸고 싶은 걸 말해보세요.', 'ai');
  statusEl.textContent = '미리보기 · ' + id; refresh(url);
}
async function initAuth(){
  const err = new URLSearchParams(location.search).get('login_error');
  if(err) $('#loginNote').textContent = '로그인 실패: ' + err.replace(/_/g,' ');
  try {
    const d = await (await fetch(API+'/auth/me')).json();
    const gh=$('#loginGithub'), gg=$('#loginGoogle');
    if(!d.providers.github){ gh.disabled=true; gh.title='GITHUB_CLIENT_ID/SECRET 미설정 — 데모로 둘러보세요'; }
    if(!d.providers.google){ gg.disabled=true; gg.title='GOOGLE_CLIENT_ID/SECRET 미설정 — 데모로 둘러보세요'; }
    if(d.user) onLoggedIn(d.user);
  } catch(e){ $('#loginNote').textContent='에이전트 서버에 연결할 수 없습니다.'; }
}
$('#loginGithub').onclick = () => { location.href = API+'/auth/github'; };
$('#loginGoogle').onclick = () => { location.href = API+'/auth/google'; };
$('#loginDemo').onclick = async () => {
  const name = prompt('이름을 입력하세요 (데모)', '게스트') || '게스트';
  await fetch(API+'/auth/demo', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({name})});
  location.href = '/';
};
initAuth();
</script>
</body>
</html>
